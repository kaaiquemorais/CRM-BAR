<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; connect-src 'none'">
<title>Pedidos | Bar e Mercearia Godoy e Souza</title>
<link rel="icon" type="image/png" href="logo.png">
<meta property="og:title" content="Bar e Mercearia Godoy e Souza">
<meta property="og:description" content="Sistema de Gestao">
<meta property="og:image" content="https://crm-bar-godoy-souza.netlify.app/logo.png">
<meta property="og:url" content="https://crm-bar-godoy-souza.netlify.app">
<meta property="og:type" content="website">
<link rel="stylesheet" href="css/style.css">
<style>
/* ===== KANBAN ===== */
.kanban-wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.kanban-col{background:#f8fafc;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.kanban-col-head{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.kanban-col-head h3{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.kanban-col-head .col-badge{background:var(--primary);color:#fff;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:700}
.col-andamento .kanban-col-head{background:#fffbeb}
.col-andamento .kanban-col-head h3{color:#92400e}
.col-andamento .col-badge{background:#f59e0b}
.col-finalizado .kanban-col-head{background:#f0fdf4}
.col-finalizado .kanban-col-head h3{color:#166534}
.col-finalizado .col-badge{background:#22c55e}
.kanban-cards{padding:12px;display:flex;flex-direction:column;gap:10px;min-height:200px}
.kanban-empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px}
.kanban-empty svg{width:36px;height:36px;margin-bottom:10px;opacity:.3;display:block;margin-left:auto;margin-right:auto}

/* ===== ORDER CARD ===== */
.order-card-k{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:0;box-shadow:var(--shadow);transition:box-shadow .15s;overflow:hidden}
.order-card-k:hover{box-shadow:var(--shadow-md)}
.order-card-k.finalizado{opacity:.75}
.ock-top{padding:12px 16px 10px;border-left:4px solid var(--primary)}
.ock-top.time-new{border-color:#22c55e}
.ock-top.time-mid{border-color:#f59e0b}
.ock-top.time-old{border-color:#ef4444}
.ock-top.done{border-color:#94a3b8}
.ock-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ock-num{font-size:12px;font-weight:700;color:var(--primary)}
.ock-num.done{color:var(--text-muted)}
.ock-time{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
.time-new .ock-time{background:#dcfce7;color:#166534}
.time-mid .ock-time{background:#fef3c7;color:#92400e}
.time-old .ock-time{background:#fee2e2;color:#dc2626}
.done .ock-time{background:#f1f5f9;color:var(--text-muted)}
.ock-client{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.ock-items{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:8px}
.ock-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#f8fafc;border-top:1px solid var(--border-light)}
.ock-total{font-size:17px;font-weight:800;color:var(--text)}
.ock-actions{display:flex;gap:6px}
.ock-actions .btn{font-size:12px;padding:6px 12px}

/* ===== STATS BAR ===== */
.pedidos-stats{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.pstat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 18px;display:flex;align-items:center;gap:10px;flex:1;min-width:140px}
.pstat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pstat-icon svg{width:18px;height:18px}
.pstat-val{font-size:20px;font-weight:800;color:var(--text)}
.pstat-label{font-size:12px;color:var(--text-secondary)}

/* ===== DRAWER ===== */
.drawer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.show{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;width:480px;max-width:100vw;height:100vh;background:var(--card);box-shadow:-8px 0 32px rgba(0,0,0,.12);z-index:301;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drawer-overlay.show .drawer{transform:translateX(0)}
.drawer-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.drawer-head h2{font-size:17px;font-weight:700;color:var(--text);flex:1}
.drawer-head p{font-size:13px;color:var(--text-secondary);margin-top:2px}
.drawer-close{width:36px;height:36px;border-radius:8px;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);flex-shrink:0}
.drawer-close svg{width:18px;height:18px}
.drawer-body{flex:1;overflow-y:auto;padding:20px 24px}
.drawer-footer{padding:16px 24px;border-top:1px solid var(--border);flex-shrink:0}

/* ===== QUICK PRODUCTS ===== */
.section-label{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.quick-grid.favorites-grid{grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.quick-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;position:relative}
.quick-btn:hover:not(:disabled){border-color:var(--primary);background:var(--primary-lighter);transform:translateY(-1px)}
.quick-btn:active:not(:disabled){transform:translateY(0)}
.quick-btn:disabled{opacity:.45;cursor:not-allowed}
.quick-btn.fav{background:linear-gradient(135deg,#fef3c7,#fff);border-color:#fcd34d;padding:14px 8px}
.quick-btn.fav:hover:not(:disabled){border-color:#f59e0b;background:linear-gradient(135deg,#fef3c7,#fef9ee);box-shadow:0 4px 12px rgba(245,158,11,.2)}
.quick-btn.fav .qb-emoji{font-size:32px}
.quick-btn.fav .qb-name{font-size:12px}
.quick-btn .qb-emoji{font-size:24px;display:block;margin-bottom:4px}
.quick-btn .qb-name{font-size:11px;font-weight:600;color:var(--text);display:block;line-height:1.2}
.quick-btn .qb-price{font-size:10px;color:var(--text-muted);display:block;margin-top:2px}
.quick-btn .qb-added{position:absolute;top:-6px;right:-6px;background:var(--primary);color:#fff;font-size:10px;font-weight:700;width:20px;height:20px;border-radius:99px;display:flex;align-items:center;justify-content:center;display:none}
.quick-btn.has-items .qb-added{display:flex}
/* ===== WELCOME POPUP ===== */
.welcome-popup{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:400;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.14);padding:16px 20px 14px;max-width:380px;width:calc(100vw - 48px);border:1px solid #ede9fe;animation:wpIn .35s cubic-bezier(.34,1.4,.64,1)}
@keyframes wpIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.welcome-popup.pride{border-color:#fed7aa}
.wp-head{display:flex;align-items:flex-start;gap:10px}
.wp-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.wp-content{flex:1}
.wp-text{font-size:13.5px;font-style:italic;color:#1e293b;line-height:1.6;font-weight:500}
.wp-ref{font-size:12px;color:#6366f1;font-weight:700;margin-top:5px}
.wp-ref.pride-ref{color:#d97706}
.wp-close{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:18px;line-height:1;padding:0;flex-shrink:0;margin-top:-2px}
/* ===== LOW STOCK POPUP ===== */
.low-stock-popup{position:fixed;top:80px;right:24px;background:#fff;border:1.5px solid #fcd34d;border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:16px 20px;z-index:250;max-width:320px;animation:slideInRight .3s ease}
@keyframes slideInRight{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.lsp-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.lsp-head h4{font-size:14px;font-weight:700;color:#92400e;flex:1}
.lsp-close{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px;line-height:1;padding:0}
.lsp-item{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #fef3c7;color:var(--text)}
.lsp-item:last-child{border-bottom:none}
.lsp-item strong{color:#dc2626}

/* ===== DRAWER ORDER ITEMS ===== */
.drawer-items{margin-bottom:16px}
.drawer-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-light)}
.drawer-item:last-child{border-bottom:none}
.di-info{flex:1}
.di-name{font-size:14px;font-weight:600;color:var(--text)}
.di-price{font-size:12px;color:var(--text-muted)}
.di-subtotal{font-size:14px;font-weight:700;color:var(--text);min-width:64px;text-align:right}
.drawer-total-bar{background:var(--primary-lighter);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.drawer-total-bar span{font-size:14px;font-weight:600;color:var(--text-secondary)}
.drawer-total-bar strong{font-size:22px;font-weight:800;color:var(--primary)}
.drawer-empty{text-align:center;padding:32px;color:var(--text-muted)}
.drawer-empty svg{width:40px;height:40px;opacity:.3;margin-bottom:12px}

/* ===== SEARCH ===== */
.search-results{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.sr-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.sr-item:hover{border-color:var(--primary);background:var(--primary-lighter)}
.sr-item .sr-emoji{font-size:20px}
.sr-item .sr-name{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.sr-item .sr-price{font-size:13px;color:var(--text-secondary)}
.sr-item .sr-add{width:28px;height:28px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center}

/* ===== HISTORY ===== */
.history-section{margin-top:32px}
.history-section details{margin-top:0}
.history-section summary{cursor:pointer;font-size:14px;font-weight:600;color:var(--text-secondary);padding:12px 0;list-style:none;display:flex;align-items:center;gap:8px}
.history-section summary::before{content:'▶';font-size:10px;transition:transform .2s}
.history-section details[open] summary::before{transform:rotate(90deg)}
</style>
</head>
<body>
<div id="navContainer"></div>
<div class="layout">
  <div class="main">
    <header class="topbar">
      <div class="topbar-title">
        <h1>Pedidos</h1>
        <p id="topbarSub">Gerencie as comandas</p>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openDrawer(null)">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nova Comanda
        </button>
      </div>
    </header>

    <main class="page-content">

      <!-- Stats bar -->
      <div class="pedidos-stats" id="pedidosStats"></div>

      <!-- Kanban -->
      <div class="kanban-wrap">
        <!-- Em Andamento -->
        <div class="kanban-col col-andamento">
          <div class="kanban-col-head">
            <h3>
              <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Em Andamento
              <span class="col-badge" id="badgeAberto">0</span>
            </h3>
          </div>
          <div class="kanban-cards" id="colAberto"></div>
        </div>

        <!-- Finalizados -->
        <div class="kanban-col col-finalizado">
          <div class="kanban-col-head">
            <h3>
              <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="16" height="16"><path d="M20 6 9 17l-5-5"/></svg>
              Finalizados Hoje
              <span class="col-badge" id="badgePago">0</span>
            </h3>
            <span id="revHoje" style="font-size:13px;font-weight:700;color:var(--success)"></span>
          </div>
          <div class="kanban-cards" id="colPago"></div>
        </div>
      </div>

      <!-- Histórico -->
      <div class="history-section">
        <details>
          <summary>Histórico de pedidos anteriores</summary>
          <div style="margin-top:16px">
            <div class="toolbar" style="margin-bottom:16px">
              <div class="search-input" style="max-width:300px">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="histSearch" placeholder="Buscar pedido…" oninput="renderHistory()">
              </div>
              <button class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;padding:8px 14px;font-size:13px" onclick="confirmDeleteAll()">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6m4-6v6"/></svg>
                Apagar Todos
              </button>
            </div>
            <div id="historyList"></div>
          </div>
        </details>
      </div>

    </main>
  </div>
</div>

<!-- ===== DRAWER ===== -->
<div class="drawer-overlay" id="drawerOverlay" onclick="handleOverlayClick(event)">
  <div class="drawer" id="drawer">
    <div class="drawer-head">
      <div style="flex:1">
        <h2 id="drawerTitle">Nova Comanda</h2>
        <p id="drawerSub">Adicione os itens do pedido</p>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="drawer-body">

      <!-- Cliente -->
      <div class="form-group">
        <label>Mesa / Cliente</label>
        <input type="text" id="drawerClient" placeholder="Ex: Mesa 3, João…" style="font-size:15px;font-weight:500">
      </div>

      <!-- Favorite items (pastel, coxinha, bebidas) -->
      <div class="section-label">Favoritos</div>
      <div class="quick-grid favorites-grid" id="favGrid"></div>

      <!-- Quick buttons -->
      <div class="section-label">Mais vendidos</div>
      <div class="quick-grid" id="quickGrid"></div>

      <!-- Search -->
      <div class="section-label">Buscar produto</div>
      <div class="search-input" style="margin-bottom:10px">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="drawerSearch" placeholder="Digite o nome…" oninput="renderSearchResults()">
      </div>
      <div class="search-results" id="searchResults"></div>

      <!-- Order items -->
      <div id="drawerOrderSection" style="display:none">
        <hr class="divider">
        <div class="section-label">Itens do pedido</div>
        <div class="drawer-items" id="drawerItems"></div>
        <div class="drawer-total-bar">
          <span>Total do pedido</span>
          <strong id="drawerTotal">R$ 0,00</strong>
        </div>
      </div>

    </div>

    <div class="drawer-footer">
      <div id="drawerActionArea"></div>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script>
DB.init();
renderNav('pedidos');

// ===== STATE =====
let drawerOrderId = null;   // null = new order, number = editing existing
let draftItems = [];        // { productId, productName, price, quantity, emoji }

// ===== HELPERS =====
function timeAgo(iso) {
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60) return 'agora';
  if (diff < 3600) return `${Math.floor(diff/60)}min`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  return fmtDate(iso);
}
function timeClass(iso, done) {
  if (done) return 'done';
  const diff = (Date.now() - new Date(iso)) / 60000;
  if (diff < 10) return 'time-new';
  if (diff < 30) return 'time-mid';
  return 'time-old';
}
function topProducts(limit = 12) {
  const orders = DB.getOrders().filter(o => o.status !== 'cancelado');
  const sales = {};
  orders.forEach(o => (o.items || []).forEach(i => {
    if (!sales[i.productId]) sales[i.productId] = { qty: 0, item: i };
    sales[i.productId].qty += i.quantity;
  }));
  const products = DB.getProducts();
  // merge sales data with current product info
  const ranked = products.map(p => ({
    ...p,
    salesQty: sales[p.id]?.qty || 0
  })).sort((a, b) => b.salesQty - a.salesQty).slice(0, limit);
  return ranked;
}

// ===== RENDER KANBAN =====
function renderKanban() {
  const orders = DB.getOrders();
  const today = new Date().toDateString();

  const abertos = orders.filter(o => o.status === 'aberto')
    .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

  const pagosHoje = orders.filter(o => o.status === 'pago' && new Date(o.createdAt).toDateString() === today)
    .sort((a, b) => new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt));

  document.getElementById('badgeAberto').textContent = abertos.length;
  document.getElementById('badgePago').textContent = pagosHoje.length;

  const revHoje = pagosHoje.reduce((s, o) => s + o.total, 0);
  document.getElementById('revHoje').textContent = revHoje > 0 ? fmtMoney(revHoje) : '';

  renderCol('colAberto', abertos, false);
  renderCol('colPago', pagosHoje, true);
  renderStats(abertos, pagosHoje);
  renderHistory();
}

function renderCol(colId, orders, done) {
  const col = document.getElementById(colId);
  if (!orders.length) {
    col.innerHTML = `<div class="kanban-empty">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      ${done ? 'Nenhum pedido finalizado hoje' : 'Nenhuma comanda em aberto'}
    </div>`;
    return;
  }
  col.innerHTML = orders.map(o => buildCard(o, done)).join('');
}

function buildCard(o, done) {
  const tc = timeClass(o.createdAt, done);
  const ta = timeAgo(done ? (o.updatedAt || o.createdAt) : o.createdAt);
  const itemsSummary = (o.items || []).map(i => {
    const p = DB.getProduct(i.productId);
    return `${p?.emoji || ''}${i.quantity}x`;
  }).join(' ');

  return `<div class="order-card-k${done ? ' finalizado' : ''}">
    <div class="ock-top ${tc}">
      <div class="ock-head">
        <span class="ock-num${done?' done':''}">${escHtml(o.orderNumber)}</span>
        <span class="ock-time">${ta}</span>
      </div>
      <div class="ock-client">${escHtml(o.client || 'Consumidor')}</div>
      <div class="ock-items">${itemsSummary || 'Sem itens'}</div>
    </div>
    <div class="ock-footer">
      <span class="ock-total">${fmtMoney(o.total)}</span>
      <div class="ock-actions">
        ${!done ? `
          <button class="btn btn-secondary" onclick="openDrawer(${o.id})">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Adicionar
          </button>
          <button class="btn btn-success" onclick="finalizeOrder(${o.id})">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14"><path d="M20 6 9 17l-5-5"/></svg>
            Finalizar
          </button>
        ` : `
          <button class="btn btn-ghost btn-sm" onclick="cancelOrder(${o.id})" title="Cancelar pedido">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        `}
      </div>
    </div>
  </div>`;
}

// ===== STATS =====
function renderStats(abertos, pagosHoje) {
  const revHoje = pagosHoje.reduce((s, o) => s + o.total, 0);
  const allAbertosTotal = abertos.reduce((s, o) => s + o.total, 0);
  document.getElementById('pedidosStats').innerHTML = `
    <div class="pstat">

// ===== FINALIZE / CANCEL =====
window.finalizeOrder = function(id) {
  const o = DB.getOrders().find(x => x.id === id);
  if (!o) return;
  if (!confirm(`Finalizar pedido ${o.orderNumber} (${o.client || 'Consumidor'}): ${fmtMoney(o.total)}?`)) return;
  DB.finalizeOrder(id);
  toast(`${o.orderNumber} finalizado!`, 'success');
  renderKanban();
};
window.cancelOrder = function(id) {
  const o = DB.getOrders().find(x => x.id === id);
  if (!o) return;
  if (!confirm(`Cancelar pedido ${o.orderNumber}?`)) return;
  DB.updateOrderStatus(id, 'cancelado');
  toast('Pedido cancelado', 'default');
  renderKanban();
};

// ===== DRAWER =====
window.openDrawer = function(orderId) {
  drawerOrderId = orderId;
  draftItems = [];

  if (orderId) {
    const o = DB.getOrders().find(x => x.id === orderId);
    if (!o) return;
    document.getElementById('drawerTitle').textContent = o.orderNumber;
    document.getElementById('drawerSub').textContent = `${o.client || 'Consumidor'} · adicionar mais itens`;
    document.getElementById('drawerClient').value = o.client || '';
    document.getElementById('drawerClient').disabled = true;
  } else {
    document.getElementById('drawerTitle').textContent = 'Nova Comanda';
    document.getElementById('drawerSub').textContent = 'Adicione os itens do pedido';
    document.getElementById('drawerClient').value = '';
    document.getElementById('drawerClient').disabled = false;
  }

  document.getElementById('drawerSearch').value = '';
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('drawerOverlay').classList.add('show');
  renderQuickGrid();
  renderDrawerItems();
  renderDrawerActions();
  setTimeout(() => document.getElementById('drawerClient').focus(), 300);
};

window.closeDrawer = function() {
  document.getElementById('drawerOverlay').classList.remove('show');
  draftItems = [];
  drawerOrderId = null;
};

window.handleOverlayClick = function(e) {
  if (e.target === document.getElementById('drawerOverlay')) closeDrawer();
};

// ===== QUICK GRID =====
function renderQuickGrid() {
  const top = topProducts(12);
  document.getElementById('quickGrid').innerHTML = top.map(p => {
    const qty = draftItems.find(i => i.productId === p.id)?.quantity || 0;
    const outOfStock = p.stock === 0;
    return `<button class="quick-btn${qty > 0 ? ' has-items' : ''}${outOfStock ? '' : ''}"
      onclick="${outOfStock ? '' : `addDraftItem(${p.id})`}"
      ${outOfStock ? 'disabled title="Sem estoque"' : ''}
      >
      <span class="qb-added">${qty}</span>
      <span class="qb-emoji">${p.emoji || '📦'}</span>
      <span class="qb-name">${escHtml(p.name.length > 14 ? p.name.slice(0,13)+'…' : p.name)}</span>
      <span class="qb-price">${fmtMoney(p.price)}</span>
    </button>`;
  }).join('');
}

// ===== SEARCH =====
window.renderSearchResults = function() {
  const q = document.getElementById('drawerSearch').value.toLowerCase().trim();
  if (!q) { document.getElementById('searchResults').innerHTML = ''; return; }
  const results = DB.getProducts().filter(p =>
    p.name.toLowerCase().includes(q) || (p.category || '').toLowerCase().includes(q)
  ).slice(0, 8);
  document.getElementById('searchResults').innerHTML = results.map(p => `
    <div class="sr-item" onclick="addDraftItem(${p.id})">
      <span class="sr-emoji">${p.emoji || '📦'}</span>
      <span class="sr-name">${escHtml(p.name)}</span>
      <span class="sr-price">${fmtMoney(p.price)}</span>
      <button class="sr-add">+</button>
    </div>`).join('');
};

// ===== DRAFT ITEMS =====
window.addDraftItem = function(productId) {
  const p = DB.getProduct(productId);
  if (!p) return;
  const existing = draftItems.find(i => i.productId === productId);
  if (existing) {
    existing.quantity++;
  } else {
    draftItems.push({ productId: p.id, productName: p.name, price: p.price, quantity: 1, emoji: p.emoji || '📦' });
  }
  renderQuickGrid();
  renderDrawerItems();
  renderDrawerActions();
};

window.changeDraftQty = function(productId, delta) {
  const idx = draftItems.findIndex(i => i.productId === productId);
  if (idx === -1) return;
  draftItems[idx].quantity += delta;
  if (draftItems[idx].quantity <= 0) draftItems.splice(idx, 1);
  renderQuickGrid();
  renderDrawerItems();
  renderDrawerActions();
};

function renderDrawerItems() {
  const section = document.getElementById('drawerOrderSection');
  const container = document.getElementById('drawerItems');
  const totalEl = document.getElementById('drawerTotal');

  // If editing existing order, also show existing items grayed out
  let existingItems = [];
  if (drawerOrderId) {
    const o = DB.getOrders().find(x => x.id === drawerOrderId);
    if (o) existingItems = o.items || [];
  }

  const total = draftItems.reduce((s, i) => s + i.price * i.quantity, 0);
  totalEl.textContent = fmtMoney(total);

  if (!draftItems.length && !existingItems.length) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';

  let html = '';
  if (existingItems.length) {
    html += `<div style="font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:8px">Já no pedido</div>`;
    html += existingItems.map(i => `
      <div class="drawer-item" style="opacity:.6">
        <div class="di-info">
          <div class="di-name">${DB.getProduct(i.productId)?.emoji||'📦'} ${escHtml(i.productName)}</div>
          <div class="di-price">${fmtMoney(i.price)} × ${i.quantity}</div>
        </div>
        <div class="di-subtotal">${fmtMoney(i.price * i.quantity)}</div>
      </div>`).join('');
    if (draftItems.length) html += `<div style="font-size:12px;color:var(--text-muted);font-weight:600;margin:12px 0 8px">Adicionando</div>`;
  }

  html += draftItems.map(i => `
    <div class="drawer-item">
      <div class="di-info">
        <div class="di-name">${i.emoji} ${escHtml(i.productName)}</div>
        <div class="di-price">${fmtMoney(i.price)} cada</div>
      </div>
      <div class="ci-controls">
        <button class="qty-btn" onclick="changeDraftQty(${i.productId},-1)">−</button>
        <span class="qty-num">${i.quantity}</span>
        <button class="qty-btn" onclick="changeDraftQty(${i.productId},1)">+</button>
      </div>
      <div class="di-subtotal">${fmtMoney(i.price * i.quantity)}</div>
    </div>`).join('');

  container.innerHTML = html;
}

function renderDrawerActions() {
  const area = document.getElementById('drawerActionArea');
  if (drawerOrderId) {
    area.innerHTML = `
      <button class="btn btn-primary" style="width:100%;margin-bottom:8px;padding:13px" onclick="saveAddItems()" ${!draftItems.length ? 'disabled' : ''}>
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar ao Pedido (${draftItems.length > 0 ? fmtMoney(draftItems.reduce((s,i)=>s+i.price*i.quantity,0)) : 'selecione itens'})
      </button>
      <button class="btn btn-success" style="width:100%;padding:13px" onclick="saveAndFinalize()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16"><path d="M20 6 9 17l-5-5"/></svg>
        Finalizar Pedido
      </button>`;
  } else {
    area.innerHTML = `
      <button class="btn btn-primary" style="width:100%;padding:14px;font-size:15px" onclick="createOrder()" ${!draftItems.length ? 'disabled' : ''}>
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        Abrir Comanda${draftItems.length > 0 ? ' · ' + fmtMoney(draftItems.reduce((s,i)=>s+i.price*i.quantity,0)) : ''}
      </button>`;
  }
}

// ===== SAVE ACTIONS =====
window.createOrder = function() {
  if (!draftItems.length) { toast('Adicione pelo menos 1 item', 'warning'); return; }
  const client = document.getElementById('drawerClient').value.trim() || 'Consumidor';
  const total = draftItems.reduce((s, i) => s + i.price * i.quantity, 0);
  const o = DB.addOrder({
    client,
    items: draftItems.map(i => ({ productId: i.productId, productName: i.productName, quantity: i.quantity, price: i.price })),
    total,
    status: 'aberto'
  });
  toast(`${o.orderNumber} · ${escHtml(client)} aberto!`, 'success');
  closeDrawer();
  renderKanban();
};

window.saveAddItems = function() {
  if (!draftItems.length) { toast('Adicione pelo menos 1 item', 'warning'); return; }
  draftItems.forEach(item => {
    DB.addItemToOrder(drawerOrderId, { productId: item.productId, productName: item.productName, quantity: item.quantity, price: item.price });
  });
  toast('Itens adicionados ao pedido!', 'success');
  closeDrawer();
  renderKanban();
};

window.saveAndFinalize = function() {
  if (draftItems.length) {
    draftItems.forEach(item => {
      DB.addItemToOrder(drawerOrderId, { productId: item.productId, productName: item.productName, quantity: item.quantity, price: item.price });
    });
  }
  const o = DB.getOrders().find(x => x.id === drawerOrderId);
  if (o && !o.items.length && !draftItems.length) { toast('Pedido sem itens', 'warning'); return; }
  DB.finalizeOrder(drawerOrderId);
  toast('Pedido finalizado!', 'success');
  closeDrawer();
  renderKanban();
};

// ===== HISTORY =====
function renderHistory() {
  const q = (document.getElementById('histSearch')?.value || '').toLowerCase();
  const today = new Date().toDateString();
  let orders = DB.getOrders()
    .filter(o => new Date(o.createdAt).toDateString() !== today || o.status === 'cancelado')
    .filter(o => o.status !== 'aberto')
    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
    .slice(0, 100);
  if (q) orders = orders.filter(o =>
    (o.orderNumber || '').toLowerCase().includes(q) ||
    (o.client || '').toLowerCase().includes(q)
  );
  const statusInfo = { pago: ['badge-success','Pago'], cancelado: ['badge-gray','Cancelado'] };
  document.getElementById('historyList').innerHTML = orders.length
    ? orders.map(o => {
        const [cls, lbl] = statusInfo[o.status] || ['badge-gray', o.status];
        const itensDesc = (o.items||[]).map(i => `${i.quantity}x ${escHtml(i.productName)}`).join(', ');
        return `<div class="order-card" style="margin-bottom:8px;flex-wrap:wrap;gap:8px">
          <div class="order-num">${escHtml(o.orderNumber)}</div>
          <div style="flex:1;min-width:120px">
            <div class="order-client">${escHtml(o.client || 'Consumidor')}</div>
            <div class="order-items-count" style="font-size:11px;color:var(--text-muted);margin-top:2px">${itensDesc || o.items.length + ' item(s)'}</div>
          </div>
          <div class="text-right">
            <div class="order-total">${fmtMoney(o.total)}</div>
            <div class="order-date">${fmtDate(o.createdAt, true)}</div>
          </div>
          <span class="badge ${cls}" style="margin-left:4px">${lbl}</span>
          <div style="display:flex;gap:6px;margin-left:4px">
            <button class="btn btn-secondary btn-sm" style="padding:5px 10px;font-size:12px" onclick="openEditOrder(${o.id})" title="Editar">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Editar
            </button>
            <button class="btn btn-sm" style="padding:5px 10px;font-size:12px;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5" onclick="confirmDeleteOrder(${o.id})" title="Apagar">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6m4-6v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              Apagar
            </button>
          </div>
        </div>`;
      }).join('')
    : `<div class="empty-state" style="padding:32px"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" width="40" height="40"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><h3>Nenhum histórico</h3></div>`;
}

window.saveEditOrder = function(id) {
  const client = sanitize(document.getElementById('editOrderClient').value.trim(), 80) || 'Consumidor';
  const status = document.getElementById('editOrderStatus').value;
  DB.updateOrderStatus(id, status);
  const arr = DB.getOrders().map(o => o.id === id ? { ...o, client, updatedAt: new Date().toISOString() } : o);
  DB._set(DB.KEYS.orders, arr);
  document.getElementById('editOrderModal').remove();
  renderHistory();
  renderKanban();
  toast('Pedido atualizado!', 'success');
};

        </div>
        <h3 style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px">Apagar todo o histórico?</h3>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:4px">Esta ação vai remover <strong>${toDelete.length} pedido(s)</strong> do histórico.</p>
        <p style="font-size:12px;color:#dc2626;font-weight:500;margin-bottom:20px">Não pode ser desfeita.</p>
      </div>
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">Confirme sua senha para continuar</label>
        <input type="password" id="deleteAllPass" placeholder="Sua senha"
          style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);background:var(--card);outline:none;font-family:inherit;box-sizing:border-box"
          onkeydown="if(event.key==='Enter')doDeleteAll()">
        <div id="deleteAllErr" style="color:#dc2626;font-size:12px;margin-top:6px;display:none">Senha incorreta. Tente novamente.</div>
      </div>
      <div style="display:flex;gap:10px">
        <button onclick="document.getElementById('deleteAllModal').remove()"
          style="flex:1;padding:11px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">
          Cancelar
        </button>
        <button onclick="doDeleteAll()"
          style="flex:1;padding:11px;background:#dc2626;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">
          Apagar Tudo
        </button>
      </div>
    </div>`;

  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  setTimeout(() => document.getElementById('deleteAllPass')?.focus(), 100);
};

window.doDeleteAll = function() {
  const pass = document.getElementById('deleteAllPass')?.value || '';
  const user = AUTH.getUser();
  const valid = AUTH.USERS.some(u => u.login === user?.login && u.password === pass);
  if (!valid) {
    const err = document.getElementById('deleteAllErr');
    if (err) err.style.display = 'block';
    if (document.getElementById('deleteAllPass')) document.getElementById('deleteAllPass').value = '';
    return;
  }

  const today = new Date().toDateString();
  const toKeep = DB.getOrders().filter(o =>
    (new Date(o.createdAt).toDateString() === today && o.status !== 'cancelado') ||
    o.status === 'aberto'
  );
  DB.saveOrders(toKeep);
  document.getElementById('deleteAllModal').remove();
  renderHistory();
  renderKanban();
  toast('Histórico apagado com sucesso.', 'success');
};

// ===== FAVORITES =====
// Produtos fixos que sempre aparecem primeiro nos favoritos
const PRIORITY_KEYWORDS = ['pastel','coxinha','risole','risóleo'];
const FAV_KEYWORDS = ['cerveja','coca','refrig','suco','caipirinha','água','dose','whisky'];

function getFavProducts() {
  const products = DB.getProducts();
  // Prioridade absoluta: pastel, coxinha, risole
  const priority = products.filter(p =>
    PRIORITY_KEYWORDS.some(kw => p.name.toLowerCase().includes(kw))
  );
  // Complemento com bebidas e outros favoritos
  const others = products.filter(p =>
    !priority.find(f => f.id === p.id) &&
    FAV_KEYWORDS.some(kw => p.name.toLowerCase().includes(kw))
  );
  // Se ainda não tiver 6, completa com mais vendidos
  const combined = [...priority, ...others];
  if (combined.length < 6) {
    const top = topProducts(12).filter(p => !combined.find(f => f.id === p.id));
    return [...combined, ...top].slice(0, 6);
  }
  return combined.slice(0, 6);
}

function renderFavGrid() {
  const favs = getFavProducts();
  document.getElementById('favGrid').innerHTML = favs.map(p => {
    const qty = draftItems.find(i => i.productId === p.id)?.quantity || 0;
    const outOfStock = p.stock === 0;
    return `<button class="quick-btn fav${qty > 0 ? ' has-items' : ''}"
      onclick="${outOfStock ? '' : `addDraftItem(${p.id})`}"
      ${outOfStock ? 'disabled title="Sem estoque"' : ''}
      >
      <span class="qb-added">${qty}</span>
      <span class="qb-emoji">${p.emoji || '📦'}</span>
      <span class="qb-name">${escHtml(p.name.length > 16 ? p.name.slice(0,15)+'…' : p.name)}</span>
      <span class="qb-price">${fmtMoney(p.price)}</span>
    </button>`;
  }).join('');
}

// ===== LOW STOCK POPUP =====
function showLowStockPopup() {
  const low = DB.getProducts().filter(p => p.stock <= p.minStock && p.minStock > 0);
  if (!low.length) return;
  // Only show once per session
  if (sessionStorage.getItem('crm_lowstock_shown')) return;
  sessionStorage.setItem('crm_lowstock_shown', '1');

  const popup = document.createElement('div');
  popup.className = 'low-stock-popup';
  popup.innerHTML = `
    <div class="lsp-head">
      <span style="font-size:20px">⚠️</span>
      <h4>${low.length} produto${low.length>1?'s':''} com estoque baixo</h4>
      <button class="lsp-close" onclick="this.closest('.low-stock-popup').remove()">×</button>
    </div>
    ${low.slice(0,5).map(p => `
      <div class="lsp-item">
        <span>${p.emoji||'📦'} ${escHtml(p.name)}</span>
        <strong>${p.stock === 0 ? 'Zerado' : p.stock + ' ' + (p.unit||'un')}</strong>
      </div>`).join('')}
    ${low.length > 5 ? `<div style="font-size:12px;color:var(--text-muted);margin-top:8px;text-align:center">+${low.length-5} mais · <a href="estoque.html" style="color:var(--primary)">ver estoque</a></div>` : ''}`;
  document.body.appendChild(popup);
  setTimeout(() => { if (popup.parentNode) popup.style.animation = 'none'; }, 5000);
  setTimeout(() => { if (popup.parentNode) popup.remove(); }, 8000);
}

// ===== PATCH: also render favGrid in openDrawer =====
const _origOpenDrawer = window.openDrawer;
window.openDrawer = function(orderId) {
  _origOpenDrawer(orderId);
  renderFavGrid();
};

const _origAddDraftItem = window.addDraftItem;
window.addDraftItem = function(productId) {
  _origAddDraftItem(productId);
  renderFavGrid(); // keep fav badges in sync
};

const _origChangeDraftQty = window.changeDraftQty;
window.changeDraftQty = function(productId, delta) {
  _origChangeDraftQty(productId, delta);
  renderFavGrid();
};
