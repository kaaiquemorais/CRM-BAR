  .btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}

  .btn-go:hover{background:#4f46e5}
  .btn-cancel{background:#f1f5f9;color:#64748b}
  .btn-cancel:hover{background:#e2e8f0}
  #result{margin-top:20px;padding:14px;border-radius:10px;font-size:14px;font-weight:600;text-align:center;display:none}
  .ok{background:#dcfce7;color:#16a34a}
  .err{background:#fee2e2;color:#dc2626}
  .log{margin-top:16px;font-size:12px;color:#64748b;max-height:180px;overflow-y:auto;background:#f8fafc;border-radius:8px;padding:10px;border:1px solid #e2e8f0;display:none}

// Show current state
(function() {
  try {
    const existing = JSON.parse(localStorage.getItem('crm_products') || '[]');
    document.getElementById('countBox').innerHTML =
      `Produtos atualmente no sistema: <strong>${existing.length}</strong><br>Produtos que serão adicionados: <strong>${PRODUTOS.length}</strong>`;
  } catch(e) {
    document.getElementById('countBox').textContent = `Serão adicionados ${PRODUTOS.length} produtos.`;
  }
})();

function log(msg) {
  const el = document.getElementById('logBox');
  el.style.display = 'block';
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

function runSetup() {
  document.querySelector('.btn-go').disabled = true;
  document.querySelector('.btn-go').textContent = 'Processando...';

  try {
    // Clear products (keep other data intact)
    localStorage.removeItem('crm_products');
    log('✓ Produtos anteriores apagados.');

    // Reset nextId to 1000 so products get clean IDs
    localStorage.setItem('crm_nextid', JSON.stringify(1000));

    const now = new Date().toISOString();
    let idCounter = 1001;
    const products = PRODUTOS.map(p => ({
      id:        idCounter++,
      name:      p.name,
      category:  p.category,
      emoji:     p.emoji,
      unit:      p.unit,
      price:     0,
      cost:      0,
      stock:     0,
      minStock:  5,
      createdAt: now,
    }));

    localStorage.setItem('crm_products', JSON.stringify(products));
    // Update nextId to after all product IDs
    localStorage.setItem('crm_nextid', JSON.stringify(idCounter));

    log(`✓ ${products.length} produtos adicionados com sucesso.`);

    const result = document.getElementById('result');
    result.className = 'ok';
    result.style.display = 'block';
    result.innerHTML = `✅ ${products.length} produtos cadastrados!<br><a href="estoque.html" style="color:inherit;text-decoration:underline;margin-top:8px;display:inline-block">Ir para o Estoque →</a>`;

    setTimeout(() => { location.href = 'estoque.html'; }, 2000);
  } catch(e) {
    const result = document.getElementById('result');
    result.className = 'err';
    result.style.display = 'block';
    result.textContent = 'Erro: ' + e.message;
    document.querySelector('.btn-go').disabled = false;
    document.querySelector('.btn-go').textContent = 'Tentar novamente';
    log('✗ Erro: ' + e.message);
  }
}
</script>
